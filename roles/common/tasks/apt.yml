---
- name: Add official KeePassXC respository
  apt_repository:
    repo: ppa:phoerious/keepassxc

- name: Add github-cli apt key
  apt_key:
    keyserver: keyserver.ubuntu.com
    id: C99B11DEB97541F0

- name: Add official github-cli repository
  apt_repository:
    repo: "deb https://cli.github.com/packages {{ ansible_distribution_release }} main"

- name: Install apt packages
  apt:
    name: "{{ packages }}"
    force_apt_get: yes
  vars:
    packages:
    - chromium-browser
    - curl
    - fish
    - flashplugin-installer
    - flatpak
    - fzf
    - gh
    - git
    - httpie
    - jq
    - keepassxc
    - terminator
    - ubuntu-restricted-extras
    - vim

- import_tasks: terminator.yml
  become: no

- name: Set default editor to vim
  alternatives:
    name: editor
    path: /usr/bin/vim.basic

- import_tasks: git.yml
  become: no

- import_tasks: fzf.yml
  become: no
